<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blue Billboard - Zombie AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;overflow:hidden;background:#000;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;}
#cam{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;}
#cam.hidden{display:none;}
.fallback{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
  background:linear-gradient(135deg,#0a0a1a 0%,#1a0a0a 50%,#0a0a1a 100%);}
.fallback.hidden{display:none;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(10,0,0,0.92);color:#fff;text-align:center;padding:24px;}
.overlay.hidden{display:none;}
.overlay .logo-img{width:180px;margin-bottom:20px;}
.overlay h1{font-size:34px;text-transform:uppercase;letter-spacing:4px;margin-bottom:8px;color:#ff3333;
  text-shadow:0 0 25px rgba(255,50,50,0.6);}
.overlay h2{font-size:16px;font-weight:400;margin-bottom:20px;color:#d9d9d9;line-height:1.6;}
.overlay .final-score{font-size:80px;font-weight:900;color:#ff3333;margin:10px 0;
  text-shadow:0 0 40px rgba(255,50,50,0.5);}
.overlay .final-label{font-size:16px;color:#d9d9d9;text-transform:uppercase;letter-spacing:3px;}
.overlay .stats{font-size:15px;color:#ff6644;margin-top:6px;}
.overlay .high{font-size:16px;color:#ffdd00;margin-top:6px;}
.btn{display:inline-block;padding:16px 50px;font-size:18px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:#fff;background:#660000;
  border:2px solid #ff3333;border-radius:50px;cursor:pointer;margin-top:20px;
  box-shadow:0 0 15px rgba(255,50,50,0.3);}
.btn:active{background:#ff3333;box-shadow:0 0 25px rgba(255,50,50,0.6);}
.powered-by{position:fixed;bottom:4px;left:0;right:0;text-align:center;
  font-size:10px;color:rgba(255,50,50,0.15);letter-spacing:1px;
  text-transform:uppercase;z-index:5;pointer-events:none;}
</style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<div class="fallback hidden" id="fallback"></div>
<canvas id="game"></canvas>

<div class="overlay" id="startScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1>Zombie AR</h1>
  <h2>Zombies come from all around you!<br>Turn your phone to find them!<br>Tap to shoot before they reach you!</h2>
  <button class="btn" id="startBtn">Survive!</button>
</div>

<div class="overlay hidden" id="endScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1 id="endTitle">You Died!</h1>
  <div class="final-label">Kills</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="high" id="highDisp"></div>
  <div class="stats" id="statsDisp"></div>
  <button class="btn" id="restartBtn">Try Again!</button>
</div>

<div class="powered-by">Powered by Blue Billboard</div>

<script>
// ─── AUDIO ──────────────────────────────────────
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function snd(f,t,d,v){if(!audioCtx)return;try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t||'square';o.frequency.value=f;g.gain.value=v||0.06;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(d||0.1));
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+(d||0.1));}catch(e){}}
function playSweep(s,e,t,d,v){if(!audioCtx)return;try{var n=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t||'sawtooth';o.frequency.setValueAtTime(s,n);o.frequency.exponentialRampToValueAtTime(e,n+d);
  g.gain.setValueAtTime(v||0.06,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
  o.connect(g);g.connect(audioCtx.destination);o.start(n);o.stop(n+d);}catch(e){}}
function sfxShoot(){snd(800,'square',0.06,0.08);snd(200,'sawtooth',0.08,0.05);}
function sfxKill(){playSweep(600,100,'sawtooth',0.2,0.07);snd(150,'square',0.15,0.06);}
function sfxHit(){playSweep(200,60,'sawtooth',0.3,0.1);snd(80,'square',0.2,0.08);}
function sfxWave(){playSweep(300,900,'sine',0.3,0.05);setTimeout(function(){playSweep(400,1000,'sine',0.2,0.04);},150);}

// ─── CAMERA ─────────────────────────────────────
var cam=document.getElementById('cam');
var fallbackEl=document.getElementById('fallback');
function initCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
  .then(function(s){cam.srcObject=s;})
  .catch(function(){cam.classList.add('hidden');fallbackEl.classList.remove('hidden');});
}

// ─── DEVICE ORIENTATION ─────────────────────────
var camYaw=0,rawYaw=0,yawOffset=0;
var CAM_FOV_H=70;

function initGyro(){
  // iOS 13+ requires permission request from a user gesture
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(r){
      if(r==='granted') listenGyro();
    }).catch(function(){});
  } else {
    listenGyro();
  }
}
function listenGyro(){
  window.addEventListener('deviceorientation',function(e){
    if(e.alpha!==null) rawYaw=e.alpha;
  },true);
}
function updateYaw(){
  var diff=rawYaw-camYaw;
  while(diff>180) diff-=360;
  while(diff<-180) diff+=360;
  camYaw+=diff*0.12;
  while(camYaw<0) camYaw+=360;
  while(camYaw>=360) camYaw-=360;
}
function angleDiff(a,b){
  var d=a-b;while(d>180)d-=360;while(d<-180)d+=360;return d;
}

// ─── CANVAS ─────────────────────────────────────
var C=document.getElementById('game');
var X=C.getContext('2d');
function resize(){C.width=window.innerWidth;C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ─── CONFIG ─────────────────────────────────────
var MAX_HP=5;
var SPAWN_INTERVAL_START=2200;
var SPAWN_INTERVAL_MIN=500;

// ─── STATE ──────────────────────────────────────
var running=false,gameOver=false;
var score=0,wave=1,kills=0,hp=MAX_HP;
var highScore=parseInt(localStorage.getItem('bb_zombie_hi')||'0');
var zombies=[];var particles=[];
var frameCount=0;var lastSpawn=0;
var spawnInterval=SPAWN_INTERVAL_START;
var waveKills=0,waveTarget=5;
var screenFlash=0,damageFlash=0;

// ─── PERSPECTIVE ────────────────────────────────
function getZombieFeetY(dist){
  var t=Math.min(1,1.5/dist);
  return C.height*(0.55+t*0.43);
}
function getZombieHeight(dist){
  return C.height*Math.min(0.55,0.6/dist);
}

// ─── ZOMBIE ─────────────────────────────────────
function spawnZombie(){
  var z={
    worldAngle:Math.random()*360,
    dist:7+Math.random()*5,
    speed:(0.4+Math.random()*0.4)*(1+wave*0.05),
    hp:1+Math.floor(wave/4),
    maxHp:1+Math.floor(wave/4),
    hitTimer:0,
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:0.02+Math.random()*0.03,
    isBig:Math.random()<0.12+wave*0.02,
    armPhase:Math.random()*Math.PI*2,
    x:0,y:0,scale:0.1,onScreen:false
  };
  if(z.isBig){z.hp+=2;z.maxHp=z.hp;z.speed*=0.65;}
  zombies.push(z);
}

// ─── DRAW ZOMBIE ────────────────────────────────
function drawZombie(z){
  if(!z.onScreen) return;
  var h=getZombieHeight(z.dist);
  var w=h*0.35;
  if(h<8) return;
  var s=h/C.height;

  var feetY=z.y;
  var wobX=Math.sin(z.wobble)*3*s*4;
  var wobY=Math.cos(z.wobble*0.7)*2*s*4;
  var cx=z.x+wobX;
  var bodyCenter=feetY-h*0.5+wobY;

  X.save();
  X.translate(cx,bodyCenter);

  var distAlpha=Math.min(1,Math.max(0.2,s*2));
  X.globalAlpha=distAlpha;
  if(z.hitTimer>0) X.globalAlpha=distAlpha*(0.5+Math.sin(z.hitTimer*20)*0.5);

  // Ground shadow
  var sha=Math.min(0.5,0.15+s);
  X.fillStyle='rgba(0,0,0,'+sha+')';
  X.beginPath();X.ellipse(0,h*0.5,w*0.7,h*0.04+4,0,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(0,0,0,'+sha*0.3+')';
  X.beginPath();X.ellipse(0,h*0.5,w*1.0,h*0.06+6,0,0,Math.PI*2);X.fill();

  var legAnim=Math.sin(frameCount*0.08+z.armPhase)*14*s;
  var big=z.isBig;

  // Legs
  X.strokeStyle=big?'#2a4a2a':'#3a5a3a';X.lineWidth=Math.max(2,7*s);X.lineCap='round';
  X.beginPath();X.moveTo(-w*0.2,h*0.2);X.lineTo(-w*0.2+legAnim,h*0.48);X.stroke();
  X.beginPath();X.moveTo(w*0.2,h*0.2);X.lineTo(w*0.2-legAnim,h*0.48);X.stroke();
  X.fillStyle='#2a3a2a';
  X.beginPath();X.ellipse(-w*0.2+legAnim,h*0.49,w*0.15,h*0.03,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(w*0.2-legAnim,h*0.49,w*0.15,h*0.03,0,0,Math.PI*2);X.fill();

  // Body
  var bg=X.createLinearGradient(0,-h*0.4,0,h*0.3);
  bg.addColorStop(0,big?'#1a3a1a':'#3a6a3a');bg.addColorStop(1,big?'#0a2a0a':'#2a4a2a');
  X.fillStyle=bg;
  X.beginPath();X.ellipse(0,0,w*0.42,h*0.36,0,0,Math.PI*2);X.fill();

  // Shirt
  X.fillStyle=big?'rgba(80,40,40,0.6)':'rgba(100,80,60,0.5)';
  X.beginPath();X.ellipse(0,-h*0.05,w*0.35,h*0.2,0,0,Math.PI);X.fill();

  // Wounds
  X.strokeStyle='rgba(150,30,30,0.5)';X.lineWidth=Math.max(1,1.5*s);
  X.beginPath();X.moveTo(-w*0.15,h*0.05);X.lineTo(w*0.15,h*0.05);X.stroke();

  // Arms
  var armAnim=Math.sin(frameCount*0.06+z.armPhase)*16*s;
  X.strokeStyle=big?'#1a3a1a':'#3a6a3a';X.lineWidth=Math.max(2,6*s);X.lineCap='round';
  X.beginPath();X.moveTo(-w*0.38,-h*0.15);
  X.quadraticCurveTo(-w*0.6+armAnim,-h*0.3-armAnim*0.5,-w*0.5+armAnim*0.5,-h*0.45);X.stroke();
  X.beginPath();X.moveTo(w*0.38,-h*0.15);
  X.quadraticCurveTo(w*0.6-armAnim,-h*0.3+armAnim*0.5,w*0.5-armAnim*0.5,-h*0.45);X.stroke();
  X.fillStyle='#4a7a4a';
  X.beginPath();X.arc(-w*0.5+armAnim*0.5,-h*0.45,Math.max(2,4.5*s),0,Math.PI*2);X.fill();
  X.beginPath();X.arc(w*0.5-armAnim*0.5,-h*0.45,Math.max(2,4.5*s),0,Math.PI*2);X.fill();

  // Head
  var headR=w*0.36;
  var headY=-h*0.36;
  X.fillStyle=big?'#1a3a1a':'#3a6a3a';
  X.fillRect(-Math.max(2,5*s),headY+headR*0.6,Math.max(4,10*s),Math.max(4,9*s));
  X.fillStyle=big?'#2a4a2a':'#4a7a4a';
  X.beginPath();X.arc(0,headY,headR,0,Math.PI*2);X.fill();

  // Cheeks
  X.fillStyle='rgba(20,40,20,0.5)';
  X.beginPath();X.ellipse(-headR*0.4,headY+headR*0.2,headR*0.2,headR*0.3,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(headR*0.4,headY+headR*0.2,headR*0.2,headR*0.3,0,0,Math.PI*2);X.fill();

  // Eyes
  var eg=0.6+Math.sin(frameCount*0.1+z.wobble)*0.3;
  X.shadowColor='rgba(255,50,0,'+eg+')';X.shadowBlur=Math.max(4,10*s);
  X.fillStyle='rgba(255,50,0,'+eg+')';
  X.beginPath();X.arc(-headR*0.3,headY-headR*0.1,Math.max(1.5,3.5*s),0,Math.PI*2);X.fill();
  X.beginPath();X.arc(headR*0.3,headY-headR*0.1,Math.max(1.5,3.5*s),0,Math.PI*2);X.fill();
  X.shadowBlur=0;X.shadowColor='transparent';

  // Mouth
  X.fillStyle='#1a0a0a';
  X.beginPath();X.ellipse(0,headY+headR*0.5,headR*0.35,headR*0.2,0,0,Math.PI*2);X.fill();
  X.fillStyle='#cccc99';
  for(var t=0;t<5;t++){
    var tx2=-headR*0.25+t*(headR*0.5/4);
    X.fillRect(tx2-Math.max(0.5,1.5*s),headY+headR*0.4,Math.max(1,3*s),(t%2===0)?headR*0.12:headR*0.08);
  }

  // HP bar
  if(z.maxHp>1){
    var bw=w*0.8,bh=Math.max(2,4*s),by=-h*0.5-Math.max(4,8*s);
    X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(-bw/2,by,bw,bh);
    X.fillStyle=z.hp/z.maxHp>0.5?'#44ff44':'#ff4444';
    X.fillRect(-bw/2,by,bw*(z.hp/z.maxHp),bh);
  }

  X.globalAlpha=1;X.restore();
}

// ─── PARTICLES ──────────────────────────────────
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    var a=(i/count)*Math.PI*2+Math.random()*0.5;
    particles.push({x:x,y:y,vx:Math.cos(a)*(3+Math.random()*5),
      vy:Math.sin(a)*(3+Math.random()*5)-2,
      life:12+Math.random()*10,maxLife:22,size:2+Math.random()*4,color:color});
  }
}
function drawParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.globalAlpha=p.life/p.maxLife;X.fillStyle=p.color;
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  X.globalAlpha=1;
}

// ─── HUD ────────────────────────────────────────
function drawHUD(){
  // Top bar
  X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,C.width,75);
  X.fillStyle='rgba(255,50,50,0.3)';X.fillRect(0,73,C.width,2);

  // Score
  X.fillStyle='#fff';X.font='bold 32px Courier New';X.textAlign='center';
  X.fillText(score,C.width/2,40);

  // High score
  X.fillStyle='#ffdd00';X.font='11px Courier New';
  X.fillText('BEST: '+Math.max(highScore,score),C.width/2,55);

  // Wave
  X.fillStyle='#ff6644';X.font='bold 14px Courier New';X.textAlign='left';
  X.fillText('WAVE '+wave,16,25);

  // Kills
  X.fillStyle='#ff3333';X.font='12px Courier New';
  X.fillText(kills+' KILLS',16,42);

  // Hearts
  X.font='22px serif';X.textAlign='right';
  var hearts='';
  for(var i=0;i<MAX_HP;i++) hearts+=(i<hp)?'\u2764':'\u2661';
  X.fillStyle='#ff3333';X.fillText(hearts,C.width-16,38);

  // Wave progress
  var progW=C.width-32;
  var prog=Math.min(waveKills/waveTarget,1);
  X.fillStyle='rgba(255,50,50,0.15)';X.fillRect(16,62,progW,6);
  X.fillStyle='rgba(255,100,50,0.7)';X.fillRect(16,62,progW*prog,6);

  // ── RADAR ──
  var rR=32,rX=C.width/2,rY=C.height-rR-22;
  X.globalAlpha=0.55;
  X.fillStyle='rgba(0,0,0,0.5)';
  X.beginPath();X.arc(rX,rY,rR,0,Math.PI*2);X.fill();
  X.strokeStyle='#ff3333';X.lineWidth=1;
  X.beginPath();X.arc(rX,rY,rR,0,Math.PI*2);X.stroke();
  X.beginPath();X.arc(rX,rY,rR*0.5,0,Math.PI*2);X.stroke();
  // Cross
  X.strokeStyle='rgba(255,50,50,0.2)';
  X.beginPath();X.moveTo(rX-rR,rY);X.lineTo(rX+rR,rY);X.stroke();
  X.beginPath();X.moveTo(rX,rY-rR);X.lineTo(rX,rY+rR);X.stroke();
  // Player
  X.fillStyle='#fff';X.globalAlpha=1;
  X.beginPath();X.arc(rX,rY,2.5,0,Math.PI*2);X.fill();
  // FOV cone
  var fovR=CAM_FOV_H/2*Math.PI/180;
  X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;
  X.beginPath();X.moveTo(rX,rY);X.lineTo(rX+Math.sin(-fovR)*rR,rY-Math.cos(-fovR)*rR);X.stroke();
  X.beginPath();X.moveTo(rX,rY);X.lineTo(rX+Math.sin(fovR)*rR,rY-Math.cos(fovR)*rR);X.stroke();
  // Zombie dots
  X.globalAlpha=0.8;
  for(var i=0;i<zombies.length;i++){
    var rz=zombies[i];
    var relA=angleDiff(rz.worldAngle,camYaw-yawOffset)*Math.PI/180;
    var rd=Math.min(1,rz.dist/10);
    X.fillStyle=rz.isBig?'#ff0000':'#ff4444';
    X.beginPath();X.arc(rX+Math.sin(relA)*rR*rd,rY-Math.cos(relA)*rR*rd,rz.isBig?3:2,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // ── WARNING ARROWS ──
  for(var i=0;i<zombies.length;i++){
    var az=zombies[i];
    if(az.onScreen||az.dist>8) continue;
    var relA2=angleDiff(az.worldAngle,camYaw-yawOffset);
    if(Math.abs(relA2)<CAM_FOV_H/2) continue;
    var urg=Math.min(1,(4-az.dist)/4);
    if(urg<0) continue;
    var arrX=relA2>0?C.width-30:30;
    X.globalAlpha=0.4+urg*0.5;
    X.fillStyle='#ff3333';X.font='bold 28px Courier New';X.textAlign='center';
    X.fillText(relA2>0?'\u25B6':'\u25C0',arrX,C.height/2);
    X.font='10px Courier New';
    X.fillText(Math.round(az.dist)+'m',arrX,C.height/2+18);
    X.globalAlpha=1;
  }
}

// ─── AR OVERLAY ─────────────────────────────────
function drawAROverlay(){
  X.globalAlpha=0.15;X.fillStyle='#0a0008';
  X.fillRect(0,0,C.width,C.height);X.globalAlpha=1;
  // Vignette
  var vg=X.createRadialGradient(C.width/2,C.height/2,C.width*0.3,C.width/2,C.height/2,C.width*0.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.35)');
  X.fillStyle=vg;X.fillRect(0,0,C.width,C.height);
  // Crosshair
  var cx2=C.width/2,cy2=C.height/2;
  X.strokeStyle='rgba(255,50,50,0.2)';X.lineWidth=1;
  X.beginPath();X.moveTo(cx2-20,cy2);X.lineTo(cx2+20,cy2);X.stroke();
  X.beginPath();X.moveTo(cx2,cy2-20);X.lineTo(cx2,cy2+20);X.stroke();
  X.beginPath();X.arc(cx2,cy2,14,0,Math.PI*2);X.stroke();
}

// ─── TAP HANDLER ────────────────────────────────
function handleTap(e){
  if(!running||gameOver) return;
  e.preventDefault();
  var touches=e.changedTouches?e.changedTouches:[e];
  for(var t=0;t<touches.length;t++){
    var tx=touches[t].clientX||touches[t].pageX;
    var ty=touches[t].clientY||touches[t].pageY;
    sfxShoot();spawnParticles(tx,ty,'#ffaa00',3);
    var hit=false;
    // Check closest first
    for(var i=zombies.length-1;i>=0;i--){
      var z=zombies[i];
      if(!z.onScreen) continue;
      var zh=getZombieHeight(z.dist);
      var zw=zh*0.35;
      var pad=20;
      var zcx=z.x,zcy=z.y-zh/2;
      if(tx>=zcx-zw/2-pad&&tx<=zcx+zw/2+pad&&ty>=zcy-zh/2-pad&&ty<=zcy+zh/2+pad){
        z.hp--;z.hitTimer=0.3;hit=true;
        if(z.hp<=0){
          kills++;waveKills++;score+=z.isBig?25:10;
          sfxKill();
          spawnParticles(z.x,z.y-zh/2,'#4a7a4a',12);
          spawnParticles(z.x,z.y-zh/2,'#ff3333',6);
          zombies.splice(i,1);
          if(waveKills>=waveTarget){
            wave++;waveKills=0;
            waveTarget=Math.floor(5+wave*2.5);
            spawnInterval=Math.max(SPAWN_INTERVAL_MIN,SPAWN_INTERVAL_START-wave*100);
            sfxWave();screenFlash=10;
          }
        } else {
          spawnParticles(tx,ty,'#ff0000',4);
        }
        break;
      }
    }
    if(!hit) spawnParticles(tx,ty,'rgba(150,150,150,0.5)',2);
  }
}
C.addEventListener('touchstart',handleTap,{passive:false});
C.addEventListener('click',handleTap);

// ─── GAME LOOP ──────────────────────────────────
var lastTime=0;
function gameLoop(timestamp){
  if(!running) return;
  var dt=Math.min(0.05,(timestamp-lastTime)/1000);
  lastTime=timestamp;frameCount++;

  X.clearRect(0,0,C.width,C.height);
  drawAROverlay();

  if(!gameOver){
    updateYaw();

    // Spawn
    if(timestamp-lastSpawn>spawnInterval){
      spawnZombie();
      if(wave>3&&Math.random()<0.3) spawnZombie();
      if(wave>6&&Math.random()<0.2) spawnZombie();
      lastSpawn=timestamp;
    }

    // Update zombies
    for(var i=zombies.length-1;i>=0;i--){
      var z=zombies[i];
      z.dist-=z.speed*dt;
      z.worldAngle+=Math.sin(z.wobble*0.5)*0.08;
      z.wobble+=z.wobbleSpeed;
      if(z.hitTimer>0) z.hitTimer-=dt;

      // Project to screen
      var relYaw=angleDiff(z.worldAngle,camYaw-yawOffset);
      var sx=relYaw/(CAM_FOV_H/2);

      if(Math.abs(sx)>1.4){
        z.onScreen=false;
      } else {
        z.onScreen=Math.abs(sx)<=1.1;
        z.x=C.width/2+sx*(C.width/2);
        z.y=getZombieFeetY(z.dist);
      }

      // Reached player
      if(z.dist<=0.8){
        hp--;sfxHit();damageFlash=12;
        if(z.onScreen) spawnParticles(z.x,z.y-40,'#ff0000',8);
        zombies.splice(i,1);
        if(navigator.vibrate) navigator.vibrate([100,50,150]);
        if(hp<=0){gameOver=true;screenFlash=15;setTimeout(endGame,800);}
        continue;
      }
    }
  }

  // Sort far first
  zombies.sort(function(a,b){return b.dist-a.dist;});
  for(var i=0;i<zombies.length;i++) drawZombie(zombies[i]);
  drawParticles();

  if(damageFlash>0){
    X.fillStyle='rgba(255,0,0,'+(damageFlash*0.04)+')';
    X.fillRect(0,0,C.width,C.height);damageFlash--;
  }
  if(screenFlash>0){
    X.fillStyle='rgba(100,255,100,'+(screenFlash*0.03)+')';
    X.fillRect(0,0,C.width,C.height);screenFlash--;
  }

  if(!gameOver) drawHUD();
  requestAnimationFrame(gameLoop);
}

// ─── START / END ────────────────────────────────
function startGame(){
  try{
    initAudio();
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
    score=0;kills=0;wave=1;hp=MAX_HP;
    waveKills=0;waveTarget=5;
    spawnInterval=SPAWN_INTERVAL_START;
    zombies=[];particles=[];
    frameCount=0;lastSpawn=0;lastTime=0;
    gameOver=false;screenFlash=0;damageFlash=0;
    yawOffset=rawYaw;camYaw=rawYaw;
    resize();
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('endScreen').classList.add('hidden');
    running=true;
    requestAnimationFrame(gameLoop);
  }catch(err){alert('Error: '+err.message);}
}

function endGame(){
  running=false;
  if(score>highScore){highScore=score;localStorage.setItem('bb_zombie_hi',highScore.toString());}
  document.getElementById('finalScore').textContent=kills;
  document.getElementById('highDisp').textContent='BEST: '+highScore+' PTS';
  document.getElementById('statsDisp').textContent='Wave '+wave+' | '+score+' points';
  document.getElementById('endTitle').textContent=wave>5?'VALIANT EFFORT!':'YOU DIED!';
  document.getElementById('endScreen').classList.remove('hidden');
}

// ─── BUTTONS ────────────────────────────────────
function bindBtn(id,fn){
  var el=document.getElementById(id);
  el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();fn();},{passive:false});
  el.addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
  el.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();fn();});
}
bindBtn('startBtn',function(){initCamera();initGyro();startGame();});
bindBtn('restartBtn',startGame);
</script>
