<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blue Billboard - Zombie AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Courier New',monospace;overflow:hidden;background:#000;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;}

#overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:10;pointer-events:none;}

#hud{position:fixed;top:0;left:0;right:0;z-index:20;padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent 90%);
  display:none;pointer-events:none;}
#hud .score{color:#fff;font-size:32px;font-weight:900;text-align:center;}
#hud .info{display:flex;justify-content:space-between;font-size:14px;margin-top:4px;}
#hud .wave{color:#ff6644;font-weight:700;}
#hud .kills{color:#ff3333;}
#hud .hearts{color:#ff3333;font-size:22px;}
#hud .high{color:#ffdd00;font-size:11px;text-align:center;margin-top:2px;}
#waveProgress{width:100%;height:5px;background:rgba(255,50,50,0.15);margin-top:6px;border-radius:3px;overflow:hidden;}
#waveProgressBar{height:100%;width:0%;background:rgba(255,100,50,0.7);border-radius:3px;transition:width 0.3s;}
#radar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;display:none;}
#warnings{position:fixed;top:0;left:0;right:0;bottom:0;z-index:18;pointer-events:none;display:none;}
#warnings canvas{width:100%;height:100%;}

#startScreen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(10,0,0,0.92);color:#fff;text-align:center;padding:24px;}
#startScreen.hidden{display:none;}
#startScreen .logo-img{width:180px;margin-bottom:20px;}
#startScreen h1{font-size:34px;text-transform:uppercase;letter-spacing:4px;margin-bottom:8px;color:#ff3333;
  text-shadow:0 0 25px rgba(255,50,50,0.6);}
#startScreen h2{font-size:16px;font-weight:400;margin-bottom:20px;color:#d9d9d9;line-height:1.6;}
#startScreen .btn{display:inline-block;padding:16px 50px;font-size:18px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:#fff;background:#660000;
  border:2px solid #ff3333;border-radius:50px;cursor:pointer;margin-top:10px;
  box-shadow:0 0 15px rgba(255,50,50,0.3);pointer-events:auto;}
#startScreen .btn:active{background:#ff3333;}
#startScreen .warn{font-size:12px;color:#ff6644;margin-top:12px;}

#endScreen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;
  display:none;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(10,0,0,0.92);color:#fff;text-align:center;padding:24px;}
#endScreen.show{display:flex;}
#endScreen h1{font-size:34px;color:#ff3333;text-transform:uppercase;letter-spacing:4px;margin-bottom:8px;}
#endScreen .final-score{font-size:80px;font-weight:900;color:#ff3333;margin:10px 0;}
#endScreen .stats{font-size:15px;color:#ff6644;margin-top:6px;}
#endScreen .btn{display:inline-block;padding:16px 50px;font-size:18px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;color:#fff;background:#660000;
  border:2px solid #ff3333;border-radius:50px;cursor:pointer;margin-top:20px;
  box-shadow:0 0 15px rgba(255,50,50,0.3);pointer-events:auto;}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;border:2px solid rgba(255,50,50,0.3);border-radius:50%;
  z-index:15;pointer-events:none;display:none;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,50,50,0.3);}
#crosshair::before{top:50%;left:-8px;right:-8px;height:1px;}
#crosshair::after{left:50%;top:-8px;bottom:-8px;width:1px;}

#damageFlash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:25;
  background:rgba(255,0,0,0);pointer-events:none;transition:background 0.1s;}

.powered-by{position:fixed;bottom:4px;left:0;right:0;text-align:center;
  font-size:10px;color:rgba(255,50,50,0.15);letter-spacing:1px;
  text-transform:uppercase;z-index:5;pointer-events:none;}
</style>
</head>
<body>

<div id="overlay"></div>
<div id="hud">
  <div class="score" id="scoreDisp">0</div>
  <div class="high" id="highDisp"></div>
  <div class="info">
    <span class="wave" id="waveDisp">WAVE 1</span>
    <span class="kills" id="killsDisp">0 KILLS</span>
    <span class="hearts" id="heartsDisp"></span>
  </div>
  <div id="waveProgress"><div id="waveProgressBar"></div></div>
</div>
<canvas id="radar" width="80" height="80"></canvas>
<div id="warnings"><canvas id="warnCanvas"></canvas></div>
<div id="crosshair"></div>
<div id="damageFlash"></div>

<div id="startScreen">
  <img src="logo.png" alt="Blue Billboard" class="logo-img">
  <h1>Zombie AR</h1>
  <h2>Zombies walk toward you on the real floor!<br>Tap to shoot them!<br>Survive as long as you can!</h2>
  <button class="btn" id="startBtn">Start AR</button>
  <div class="warn" id="arWarn"></div>
</div>

<div id="endScreen">
  <h1 id="endTitle">You Died!</h1>
  <div style="font-size:16px;color:#d9d9d9;text-transform:uppercase;letter-spacing:3px;">Kills</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="stats" id="statsDisp"></div>
  <button class="btn" id="restartBtn">Try Again</button>
</div>

<div class="powered-by">Powered by Blue Billboard</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ─────────────────────────────────────
const MAX_HP = 5;
const SPAWN_INTERVAL_START = 2500;
const SPAWN_INTERVAL_MIN = 600;
const ZOMBIE_SPEED = 0.4; // meters per second

// ─── STATE ──────────────────────────────────────
let running = false, gameOver = false;
let score = 0, wave = 1, kills = 0, hp = MAX_HP;
let waveKills = 0, waveTarget = 5;
let spawnInterval = SPAWN_INTERVAL_START;
let lastSpawn = 0;
let floorY = null; // detected floor height
let zombies = [];
let xrSession = null;
let hitTestSource = null;
let localRefSpace = null;
let viewerRefSpace = null;
let floorDetected = false;
let reticle = null;

// ─── THREE.JS SETUP ────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(1, 3, 2);
scene.add(dirLight);
// Red point light for atmosphere
const redLight = new THREE.PointLight(0xff3333, 0.5, 10);
redLight.position.set(0, 2, 0);
scene.add(redLight);

// ─── RETICLE (floor indicator) ──────────────────
function createReticle() {
  const geo = new THREE.RingGeometry(0.1, 0.12, 32);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.6 });
  reticle = new THREE.Mesh(geo, mat);
  reticle.visible = false;
  reticle.matrixAutoUpdate = false;
  scene.add(reticle);
}
createReticle();

// ─── ZOMBIE MODEL ──────────────────────────────
function createZombieMesh(isBig) {
  const group = new THREE.Group();
  const scale = isBig ? 1.3 : 1.0;
  const skinColor = isBig ? 0x1a3a1a : 0x3a6a3a;
  const darkSkin = isBig ? 0x0a2a0a : 0x2a4a2a;

  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.15*scale, 0.18*scale, 0.5*scale, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: skinColor });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.75*scale;
  group.add(body);

  // Torn shirt
  const shirtGeo = new THREE.CylinderGeometry(0.16*scale, 0.19*scale, 0.3*scale, 8);
  const shirtMat = new THREE.MeshLambertMaterial({ color: 0x664433, transparent: true, opacity: 0.6 });
  const shirt = new THREE.Mesh(shirtGeo, shirtMat);
  shirt.position.y = 0.7*scale;
  group.add(shirt);

  // Head
  const headGeo = new THREE.SphereGeometry(0.12*scale, 8, 8);
  const headMat = new THREE.MeshLambertMaterial({ color: isBig ? 0x2a4a2a : 0x4a7a4a });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.12*scale;
  group.add(head);

  // Eyes (glowing red)
  const eyeGeo = new THREE.SphereGeometry(0.02*scale, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff2200 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.04*scale, 1.14*scale, 0.1*scale);
  group.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(0.04*scale, 1.14*scale, 0.1*scale);
  group.add(eyeR);

  // Eye glow
  const glowLight = new THREE.PointLight(0xff2200, 0.3*scale, 1);
  glowLight.position.set(0, 1.14*scale, 0.12*scale);
  group.add(glowLight);

  // Arms
  const armGeo = new THREE.CylinderGeometry(0.04*scale, 0.03*scale, 0.4*scale, 6);
  const armMat = new THREE.MeshLambertMaterial({ color: skinColor });
  const armL = new THREE.Mesh(armGeo, armMat);
  armL.position.set(-0.22*scale, 0.85*scale, 0.1*scale);
  armL.rotation.x = -0.8;
  armL.rotation.z = 0.3;
  group.add(armL);
  const armR = new THREE.Mesh(armGeo, armMat);
  armR.position.set(0.22*scale, 0.85*scale, 0.1*scale);
  armR.rotation.x = -0.8;
  armR.rotation.z = -0.3;
  group.add(armR);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.06*scale, 0.05*scale, 0.5*scale, 6);
  const legMat = new THREE.MeshLambertMaterial({ color: darkSkin });
  const legL = new THREE.Mesh(legGeo, legMat);
  legL.position.set(-0.08*scale, 0.25*scale, 0);
  group.add(legL);
  const legR = new THREE.Mesh(legGeo, legMat);
  legR.position.set(0.08*scale, 0.25*scale, 0);
  group.add(legR);

  // Ground shadow
  const shadowGeo = new THREE.CircleGeometry(0.2*scale, 16);
  shadowGeo.rotateX(-Math.PI/2);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.position.y = 0.01;
  group.add(shadow);

  // Store refs for animation
  group.userData = { armL, armR, legL, legR, head, eyeL, eyeR, glowLight, scale };

  return group;
}

// ─── SPAWN ZOMBIE ──────────────────────────────
function spawnZombie() {
  if (floorY === null) return;

  // Spawn 3-8 meters away in a random direction
  const angle = Math.random() * Math.PI * 2;
  const dist = 3 + Math.random() * 5;
  const x = camera.position.x + Math.sin(angle) * dist;
  const z = camera.position.z + Math.cos(angle) * dist;

  const isBig = Math.random() < 0.12 + wave * 0.02;
  const mesh = createZombieMesh(isBig);
  mesh.position.set(x, floorY, z);

  const zData = {
    mesh,
    speed: (ZOMBIE_SPEED + Math.random() * 0.3) * (1 + wave * 0.05),
    hp: 1 + Math.floor(wave / 4) + (isBig ? 2 : 0),
    maxHp: 1 + Math.floor(wave / 4) + (isBig ? 2 : 0),
    isBig,
    hitTimer: 0,
    wobblePhase: Math.random() * Math.PI * 2,
    alive: true
  };

  scene.add(mesh);
  zombies.push(zData);
}

// ─── ANIMATE ZOMBIE ────────────────────────────
function animateZombie(z, dt) {
  if (!z.alive) return;
  const mesh = z.mesh;
  const ud = mesh.userData;

  // Face the camera and walk toward it
  const dx = camera.position.x - mesh.position.x;
  const dz = camera.position.z - mesh.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  const angle = Math.atan2(dx, dz);
  mesh.rotation.y = angle;

  // Move toward camera
  if (dist > 0.5) {
    mesh.position.x += (dx / dist) * z.speed * dt;
    mesh.position.z += (dz / dist) * z.speed * dt;
  }

  // Shamble animation
  z.wobblePhase += dt * 4;
  const wobble = Math.sin(z.wobblePhase);
  const s = ud.scale;

  // Legs walk
  ud.legL.rotation.x = wobble * 0.4;
  ud.legR.rotation.x = -wobble * 0.4;

  // Arms reach and sway
  ud.armL.rotation.x = -0.8 + wobble * 0.3;
  ud.armR.rotation.x = -0.8 - wobble * 0.3;

  // Body sway
  mesh.rotation.z = Math.sin(z.wobblePhase * 0.5) * 0.05;

  // Head bob
  ud.head.position.y = 1.12 * s + Math.abs(wobble) * 0.02;

  // Hit flash
  if (z.hitTimer > 0) {
    z.hitTimer -= dt;
    mesh.visible = Math.sin(z.hitTimer * 20) > 0;
  } else {
    mesh.visible = true;
  }

  // Check if reached player
  if (dist < 0.7) {
    z.alive = false;
    hp--;
    updateHUD();

    // Damage flash
    const flash = document.getElementById('damageFlash');
    flash.style.background = 'rgba(255,0,0,0.4)';
    setTimeout(() => flash.style.background = 'rgba(255,0,0,0)', 200);
    if (navigator.vibrate) navigator.vibrate([100, 50, 150]);

    scene.remove(mesh);
    if (hp <= 0) {
      gameOver = true;
      setTimeout(endGame, 800);
    }
  }
}

// ─── HUD ────────────────────────────────────────
const highScore = parseInt(localStorage.getItem('bb_zombie_hi') || '0');

function updateHUD() {
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('waveDisp').textContent = 'WAVE ' + wave;
  document.getElementById('killsDisp').textContent = kills + ' KILLS';
  let h = '';
  for (let i = 0; i < MAX_HP; i++) h += i < hp ? '\u2764' : '\u2661';
  document.getElementById('heartsDisp').textContent = h;

  const best = Math.max(highScore, score);
  document.getElementById('highDisp').textContent = 'BEST: ' + best;

  const prog = Math.min(100, (waveKills / waveTarget) * 100);
  document.getElementById('waveProgressBar').style.width = prog + '%';
}

// ─── RADAR ──────────────────────────────────────
function drawRadar() {
  const rc = document.getElementById('radar');
  const rx = rc.getContext('2d');
  const R = 40, cx = 40, cy = 40;
  rx.clearRect(0, 0, 80, 80);

  // Background
  rx.globalAlpha = 0.5;
  rx.fillStyle = 'rgba(0,0,0,0.5)';
  rx.beginPath(); rx.arc(cx, cy, R, 0, Math.PI * 2); rx.fill();

  // Rings
  rx.strokeStyle = '#ff3333'; rx.lineWidth = 1;
  rx.beginPath(); rx.arc(cx, cy, R, 0, Math.PI * 2); rx.stroke();
  rx.beginPath(); rx.arc(cx, cy, R * 0.5, 0, Math.PI * 2); rx.stroke();

  // Cross
  rx.strokeStyle = 'rgba(255,50,50,0.2)';
  rx.beginPath(); rx.moveTo(cx - R, cy); rx.lineTo(cx + R, cy); rx.stroke();
  rx.beginPath(); rx.moveTo(cx, cy - R); rx.lineTo(cx, cy + R); rx.stroke();

  // Player dot
  rx.globalAlpha = 1;
  rx.fillStyle = '#fff';
  rx.beginPath(); rx.arc(cx, cy, 2.5, 0, Math.PI * 2); rx.fill();

  // Camera forward direction
  const camDir = camera.rotation.y;

  // Zombie dots
  for (let i = 0; i < zombies.length; i++) {
    const z = zombies[i];
    if (!z.alive) continue;
    const dx = z.mesh.position.x - camera.position.x;
    const dz = z.mesh.position.z - camera.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const angle = Math.atan2(dx, dz) - camDir;
    const rd = Math.min(1, dist / 10);

    rx.fillStyle = z.isBig ? '#ff0000' : '#ff4444';
    rx.globalAlpha = 0.8;
    rx.beginPath();
    rx.arc(cx + Math.sin(angle) * R * rd, cy - Math.cos(angle) * R * rd, z.isBig ? 3 : 2, 0, Math.PI * 2);
    rx.fill();
  }
  rx.globalAlpha = 1;
}

// ─── WARNING ARROWS ─────────────────────────────
function drawWarnings() {
  const wc = document.getElementById('warnCanvas');
  wc.width = window.innerWidth;
  wc.height = window.innerHeight;
  const wx = wc.getContext('2d');
  wx.clearRect(0, 0, wc.width, wc.height);

  const camDir = camera.rotation.y;
  const halfFov = 35 * Math.PI / 180;

  for (let i = 0; i < zombies.length; i++) {
    const z = zombies[i];
    if (!z.alive) continue;
    const dx2 = z.mesh.position.x - camera.position.x;
    const dz2 = z.mesh.position.z - camera.position.z;
    const dist2 = Math.sqrt(dx2 * dx2 + dz2 * dz2);
    const angle2 = Math.atan2(dx2, dz2) - camDir;

    // Normalize angle
    let a = angle2;
    while (a > Math.PI) a -= Math.PI * 2;
    while (a < -Math.PI) a += Math.PI * 2;

    // Only show arrows for off-screen zombies within 8m
    if (Math.abs(a) < halfFov || dist2 > 8) continue;

    const urgency = Math.min(1, (4 - dist2) / 4);
    if (urgency < 0) continue;

    const arrowX = a > 0 ? wc.width - 35 : 35;
    const arrowY = wc.height / 2;

    wx.globalAlpha = 0.4 + urgency * 0.5;
    wx.fillStyle = '#ff3333';
    wx.font = 'bold 30px Courier New';
    wx.textAlign = 'center';
    wx.fillText(a > 0 ? '\u25B6' : '\u25C0', arrowX, arrowY);
    wx.font = '11px Courier New';
    wx.fillText(Math.round(dist2) + 'm', arrowX, arrowY + 20);
  }
  wx.globalAlpha = 1;
}

// ─── CHECK AR SUPPORT ──────────────────────────
const arWarn = document.getElementById('arWarn');
if (!navigator.xr) {
  arWarn.textContent = 'WebXR not available — needs Chrome on Android with ARCore';
} else {
  navigator.xr.isSessionSupported('immersive-ar').then(supported => {
    if (!supported) arWarn.textContent = 'AR not supported — needs Chrome on Android with ARCore';
  });
}

// ─── START AR SESSION ──────────────────────────
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test', 'local'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.getElementById('overlay') }
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    localRefSpace = await xrSession.requestReferenceSpace('local');
    viewerRefSpace = await xrSession.requestReferenceSpace('viewer');
    hitTestSource = await xrSession.requestHitTestSource({ space: viewerRefSpace });

    // Tap to shoot
    xrSession.addEventListener('select', onSelect);
    xrSession.addEventListener('end', () => {
      running = false;
      xrSession = null;
    });

    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('hud').style.display = 'block';
    document.getElementById('crosshair').style.display = 'block';
    document.getElementById('radar').style.display = 'block';
    document.getElementById('warnings').style.display = 'block';

    score = 0; kills = 0; wave = 1; hp = MAX_HP;
    waveKills = 0; waveTarget = 5;
    spawnInterval = SPAWN_INTERVAL_START;
    lastSpawn = 0; floorY = null; floorDetected = false;
    gameOver = false;
    zombies.forEach(z => scene.remove(z.mesh));
    zombies = [];
    updateHUD();
    running = true;

    renderer.setAnimationLoop(onXRFrame);
  } catch (e) {
    arWarn.textContent = 'Error: ' + e.message;
  }
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('startScreen').classList.remove('hidden');
});

// ─── SHOOT (TAP/SELECT) ────────────────────────
function onSelect() {
  if (!running || gameOver) return;

  // Raycast from camera center to find which zombie was tapped
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

  // Collect all zombie meshes
  const meshes = zombies.filter(z => z.alive).map(z => z.mesh);
  const intersects = raycaster.intersectObjects(meshes, true);

  if (intersects.length > 0) {
    // Find which zombie owns this mesh
    let hitMesh = intersects[0].object;
    while (hitMesh.parent && !zombies.find(z => z.mesh === hitMesh)) {
      hitMesh = hitMesh.parent;
    }
    const zData = zombies.find(z => z.mesh === hitMesh);
    if (zData && zData.alive) {
      zData.hp--;
      zData.hitTimer = 0.3;

      if (zData.hp <= 0) {
        zData.alive = false;
        kills++; waveKills++;
        score += zData.isBig ? 25 : 10;
        scene.remove(zData.mesh);

        if (waveKills >= waveTarget) {
          wave++; waveKills = 0;
          waveTarget = Math.floor(5 + wave * 2.5);
          spawnInterval = Math.max(SPAWN_INTERVAL_MIN, SPAWN_INTERVAL_START - wave * 120);
        }
      }
      updateHUD();
    }
  }
}

// ─── XR FRAME LOOP ─────────────────────────────
let prevTime = 0;
function onXRFrame(time, frame) {
  if (!frame) return;
  const dt = Math.min(0.05, (time - prevTime) / 1000);
  prevTime = time;

  // Hit test to find the floor
  if (hitTestSource && !floorDetected) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const pose = hits[0].getPose(localRefSpace);
      if (pose) {
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        floorY = pose.transform.position.y;

        // Auto-detect floor after a moment of stable tracking
        if (!floorDetected) {
          floorDetected = true;
          reticle.visible = false;
        }
      }
    }
  }

  // Keep updating floor position
  if (hitTestSource && floorDetected) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const pose = hits[0].getPose(localRefSpace);
      if (pose) floorY = pose.transform.position.y;
    }
  }

  if (running && !gameOver && floorDetected) {
    // Spawn zombies
    if (time - lastSpawn > spawnInterval) {
      spawnZombie();
      if (wave > 3 && Math.random() < 0.3) spawnZombie();
      if (wave > 6 && Math.random() < 0.2) spawnZombie();
      lastSpawn = time;
    }

    // Update zombies
    for (let i = zombies.length - 1; i >= 0; i--) {
      const z = zombies[i];
      if (!z.alive) { zombies.splice(i, 1); continue; }

      // Keep feet on the floor
      z.mesh.position.y = floorY;

      animateZombie(z, dt);
    }
  }

  // Draw HUD overlays
  if (running && !gameOver) {
    updateHUD();
    drawRadar();
    drawWarnings();
  }

  renderer.render(scene, camera);
}

// ─── END GAME ──────────────────────────────────
function endGame() {
  running = false;
  document.getElementById('finalScore').textContent = kills;
  document.getElementById('statsDisp').textContent = 'Wave ' + wave + ' | ' + score + ' points';
  document.getElementById('endTitle').textContent = wave > 5 ? 'VALIANT EFFORT!' : 'YOU DIED!';
  document.getElementById('endScreen').classList.add('show');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('radar').style.display = 'none';
  document.getElementById('warnings').style.display = 'none';

  // Save high score
  const best = Math.max(highScore, score);
  localStorage.setItem('bb_zombie_hi', best.toString());

  if (xrSession) xrSession.end();
}
</script>
